<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Student | CS Connect Portal </title>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
        <link rel="shortcut icon" href="images/ccs_logo.png">
        <link rel="stylesheet" href="Style.css">

        <!-- CSS CODES -->
        <style>
            header{position: relative;}
            .change-password-container{
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 90vh;
            }
            .change-password-container form{
                display: flex;
                flex-direction: column;
                justify-content: center;
                border-radius: var(--border-radius-2);
                padding : 3.5rem;
                background-color: var(--color-white);
                box-shadow: var(--box-shadow);
                width: 95%;
                max-width: 32rem;
            }
            .change-password-container form:hover{box-shadow: none;}
            .change-password-container form input[type=password]{
                border: none;
                outline: none;
                border: 1px solid var(--color-light);
                background: transparent;
                height: 2rem;
                width: 100%;
                padding: 0 .5rem;
            }
            .change-password-container form .box{
                padding: .5rem 0;
            }
            .change-password-container form .box p{
                line-height: 2;
            }
            .change-password-container form h2+p{margin: .4rem 0 1.2rem 0;} 
            .btn{
                background: none;
                border: none;
                border: 2px solid var(--color-primary) !important;
                border-radius: var(--border-radius-1);
                padding: .5rem 1rem;
                color: var(--color-white);
                background-color: var(--color-primary);
                cursor: pointer;
                margin: 1rem 1.5rem 1rem 0;
                margin-top: 1.5rem;
            }
            .btn:hover{
                color: var(--color-primary);
                background-color: transparent;
            }
        </style>
        <!-- CSS CODES -->
    </head>
    
    <body>
        <!-- HTML CODES -->
        <header>
            <div class="logo">
                <img src="images/ccs_logo.png" alt="">
                <h2><span class="danger">CS</span>Connect Portal </h2>
            </div>
            <div class="navbar">
                <a href="StudentDashboard.html">
                    <span class="material-icons-sharp"> home </span>
                    <h3>Home</h3>
                </a>
                <a href="StudentPassword.html" class="active">
                    <span class="material-icons-sharp"> key </span>
                    <h3> Change Password </h3>
                </a>
                <a href="Main.html">
                    <span class="material-icons-sharp" onclick=""> logout </span>
                    <h3> Logout </h3>
                </a>
            </div>
            <div id="profile-btn" style="display: none;">
                <span class="material-icons-sharp"> person </span>
            </div>
            <div class="theme-toggler">
                <span class="material-icons-sharp active"> light_mode </span>
                <span class="material-icons-sharp"> dark_mode </span>
            </div>
        </header>

        <div class="change-password-container">
            <form id="change-password-form">
                <h2> Create new password </h2>
                <p class="text-muted"> Your new password must be different from previous used passwords. </p>
                <div class="box">
                    <p class="text-muted"> Current Password </p>
                    <input type="password" id="currentpass">
                </div>
                <div class="box">
                    <p class="text-muted"> New Password </p>
                    <input type="password" id="newpass">
                </div>
                <div class="box">
                    <p class="text-muted"> Confirm Password </p>
                    <input type="password" id="confirmpass">
                </div>
                <div class="button">
                    <input type="submit" value="Save" class="btn">
                    <a href="StudentDashboard.html" class="text-muted"> Cancel </a>
                </div>
                <a href="#"><p> Forget password? </p></a>
            </form>
        </div>
        <!-- HTML CODES -->

        <!-- SCRIPT CODES -->
        <script src="Script.js"></script>

        <script>

            document.addEventListener('DOMContentLoaded', () => {

                const sideMenu = document.querySelector("aside");
                const profileBtn = document.querySelector("#profile-btn");
                const themeToggler = document.querySelector(".theme-toggler");

                // Profile toggle (only if exists)
                if(profileBtn){
                    profileBtn.onclick = function() {
                        sideMenu.classList.toggle('active');
                    }
                }

                // Scroll event
                window.onscroll = () => {
                    if(sideMenu){
                        sideMenu.classList.remove('active');
                    }

                    if(window.scrollY > 0){
                        document.querySelector('header').classList.add('active');
                    }else{
                        document.querySelector('header').classList.remove('active');
                    }
                }

                // Load saved theme
                const applySavedTheme = () => {
                    const isDark = localStorage.getItem('dark-theme') === 'true';

                    if(isDark){
                        document.body.classList.add('dark-theme');
                        themeToggler.querySelector('span:nth-child(1)').classList.add('active');
                        themeToggler.querySelector('span:nth-child(2)').classList.remove('active');
                    }else{
                        document.body.classList.remove('dark-theme');
                        themeToggler.querySelector('span:nth-child(1)').classList.remove('active');
                        themeToggler.querySelector('span:nth-child(2)').classList.add('active');
                    }
                }
                applySavedTheme();

                // Toggle theme
                themeToggler.onclick = () => {
                    document.body.classList.toggle('dark-theme');

                    themeToggler.querySelector('span:nth-child(1)').classList.toggle('active');
                    themeToggler.querySelector('span:nth-child(2)').classList.toggle('active');

                    localStorage.setItem('dark-theme', document.body.classList.contains('dark-theme'));
                }
            });




            document.addEventListener('DOMContentLoaded', () => {
                const user = JSON.parse(localStorage.getItem("user"));

                // 1. Security Check: Redirect if not logged in
                if (!user || !user.IDNumber) {
                    alert("Please log in first.");
                    window.location.href = "Main.html";
                    return;
                }

                // 2. Handle Form Submission
                const passwordForm = document.getElementById("change-password-form");
                passwordForm.addEventListener("submit", function(e) {
                    e.preventDefault();

                    const currentpass = document.getElementById("currentpass").value;
                    const newpass = document.getElementById("newpass").value;
                    const confirmpass = document.getElementById("confirmpass").value;

                    // Simple Validation
                    if (newpass !== confirmpass) {
                        alert("New passwords do not match!");
                        return;
                    }

                    if (newpass.length < 6) {
                        alert("Password must be at least 6 characters long.");
                        return;
                    }

                    // API Call
                    fetch('/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id_number: user.IDNumber,
                            current_password: currentpass,
                            new_password: newpass,
                            role: user.role // Uses 'admin' or 'student' from login
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            alert("Password updated successfully!");
                            
                            // Update local session
                            user.password = newpass; 
                            localStorage.setItem("user", JSON.stringify(user));
                            
                            // Redirect based on role
                            window.location.href = (user.role === 'admin') 
                                ? "AdministratorDashboard.html" 
                                : "StudentDashboard.html";
                        } else {
                            alert(data.message);
                        }
                    })
                    .catch(err => {
                        console.error("Fetch error:", err);
                        alert("Error connecting to server.");
                    });
                });
            });


            function logout() {
                localStorage.removeItem("admin");
            }
            
        </script>
        <!-- SCRIPT CODES -->
    </body>
</html>
